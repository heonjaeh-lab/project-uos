<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이현승 · 명함</title>

<style>
  :root{
    --sky:#0085CA;        /* 서울시립대 상징색 (하늘색 / Process Blue 계열) */
    --sky-dark:#00618f;
    --sky-light:#e8f4fb;
    --sky-mist:#d5eaf7;
    --ink:#152230;
    --body:#3a4652;
    --muted:#8492a0;
    --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",
           "Segoe UI",Roboto,"Malgun Gothic","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--sans); color:var(--ink);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:32px 18px;
    background:
      radial-gradient(120% 120% at 15% 10%, #f4fafe 0%, #e7f2fa 45%, #dcecf7 100%);
    -webkit-font-smoothing:antialiased;
  }

  .card{
    width:min(940px, 96vw);
    background:#ffffff;
    border-radius:18px;
    border-top:6px solid var(--sky);
    box-shadow:0 26px 70px rgba(0,86,140,.22), 0 3px 10px rgba(0,0,0,.05);
    display:grid; grid-template-columns:39% 1fr;
    overflow:hidden;
    animation:pop .55s cubic-bezier(.2,.7,.3,1) both;
  }

  /* 사진 패널 */
  .photo{position:relative; background:var(--sky-mist); min-height:440px; border-right:1px solid var(--sky-light)}
  .photo img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:50% 20%}
  .photo::after{ /* 하단 하늘색 은은한 그라데이션 */
    content:""; position:absolute; left:0; right:0; bottom:0; height:34%;
    background:linear-gradient(to top, rgba(0,133,202,.28), transparent);
  }

  /* 정보 패널 */
  .info{padding:46px 48px; display:flex; flex-direction:column; justify-content:center}
  .kicker{
    display:flex; align-items:center; gap:9px;
    color:var(--sky); font-weight:700; font-size:.74rem; letter-spacing:.18em;
  }
  .kicker .dot{width:7px; height:7px; border-radius:50%; background:var(--sky)}
  .school{color:var(--sky-dark); font-weight:700; font-size:1.05rem; margin-top:6px; letter-spacing:-.01em}

  .name{font-size:clamp(2.1rem,5vw,3rem); font-weight:800; letter-spacing:-.03em; margin-top:16px; line-height:1.05; position:relative; display:inline-block}
  .name::after{content:""; display:block; width:52px; height:4px; border-radius:2px; background:var(--sky); margin-top:12px}
  .name-en{color:var(--muted); font-size:.82rem; letter-spacing:.16em; font-weight:600; margin-top:12px}

  .chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:18px}
  .chip{background:var(--sky-light); color:var(--sky-dark); font-weight:700; font-size:.82rem; padding:5px 13px; border-radius:999px}

  .dept{margin-top:16px}
  .dept-1{font-size:1.05rem; font-weight:700; color:var(--ink)}
  .dept-2{font-size:1.02rem; color:var(--body); margin-top:2px}

  .divider{height:1px; background:linear-gradient(to right, var(--sky-mist), transparent); margin:22px 0}

  .row{display:flex; align-items:baseline; gap:12px; font-size:.98rem}
  .row .label{color:var(--sky); font-weight:700; font-size:.8rem; letter-spacing:.06em; min-width:34px}
  .row .val{color:var(--body); font-weight:600}

  .contact{margin-top:20px; color:var(--muted); font-size:.86rem; display:flex; flex-wrap:wrap; gap:6px 16px}
  .contact .ph{border-bottom:1px dotted var(--muted); padding-bottom:1px}

  @keyframes pop{from{opacity:0; transform:translateY(16px) scale(.99)} to{opacity:1; transform:none}}
  @media (prefers-reduced-motion:reduce){ .card{animation:none} }

  /* 모바일 */
  @media (max-width:640px){
    .card{grid-template-columns:1fr}
    .photo{min-height:300px; border-right:0; border-bottom:1px solid var(--sky-light)}
    .photo img{object-position:50% 18%}
    .info{padding:30px 26px 34px}
  }
</style>

<div class="card">
  <div class="photo">
    <img src="assets/profile.jpg" alt="이현승 프로필 사진">
  </div>
  <div class="info">
    <div class="kicker"><span class="dot"></span>UNIVERSITY OF SEOUL</div>
    <div class="school">서울시립대학교</div>

    <h1 class="name">이현승</h1>
    <div class="name-en">LEE HYEON&#8209;SEUNG</div>

    <div class="chips">
      <span class="chip">만 20세</span>
    </div>

    <div class="dept">
      <div class="dept-1">첨단융합학부</div>
      <div class="dept-2">융합바이오헬스학과</div>
    </div>

    <div class="divider"></div>

    <div class="row">
      <span class="label">취미</span>
      <span class="val">♪ 노래부르기</span>
    </div>

    <div class="contact">
      <span>✉ <span class="ph">이메일 입력</span></span>
      <span>☎ <span class="ph">연락처 입력</span></span>
    </div>
  </div>
</div>
